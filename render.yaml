services:

  # ── 1. FastAPI Backend ──────────────────────────────────
  - type: web
    name: botzi-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── 2. Daily WorkDrive Sync Cron Job ────────────────────
  - type: cron
    name: botzi-sync
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m zoho_sync.sync_runner
    schedule: "0 2 * * *"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"