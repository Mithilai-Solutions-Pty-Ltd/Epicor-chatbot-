<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOTZI – Epicor AI Support</title>
  <style>
    /* ═══════════════════════════════════════════════
       BOTZI Chat UI – Production Ready
       ═══════════════════════════════════════════════ */
    :root {
      --primary:    #1a56db;
      --primary-dk: #1341b0;
      --surface:    #ffffff;
      --bg:         #f0f4ff;
      --border:     #d1d9f0;
      --text:       #1e293b;
      --text-muted: #64748b;
      --bot-bg:     #eef2ff;
      --user-bg:    #1a56db;
      --user-txt:   #ffffff;
      --shadow:     0 4px 24px rgba(26,86,219,0.12);
      --radius:     16px;
      --green:      #10b981;
      --amber:      #f59e0b;
      --red:        #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ── Chat Container ── */
    #chat-app {
      width: 100%;
      max-width: 800px;
      height: 90vh;
      max-height: 900px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── Header ── */
    .chat-header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dk));
      color: #fff;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .chat-header .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .chat-header .info h1 { font-size: 17px; font-weight: 700; }
    .chat-header .info p  { font-size: 12px; opacity: 0.85; }
    .env-badge {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255,255,255,0.2);
    }
    .new-chat-btn {
      margin-left: 12px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: background .2s;
    }
    .new-chat-btn:hover { background: rgba(255,255,255,0.25); }

    /* ── Messages Area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Message Bubbles ── */
    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      background: var(--bot-bg);
    }
    .msg-row.user .msg-avatar { background: var(--primary); }

    .msg-content { max-width: 75%; }
    .msg-bubble {
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 14px;
    }
    .msg-row.bot  .msg-bubble { background: var(--bot-bg); color: var(--text); border-top-left-radius: 4px; }
    .msg-row.user .msg-bubble { background: var(--user-bg); color: var(--user-txt); border-top-right-radius: 4px; }

    /* Markdown inside bot bubbles */
    .msg-bubble h2, .msg-bubble h3 { font-size: 14px; font-weight: 600; margin: 8px 0 4px; }
    .msg-bubble ul, .msg-bubble ol  { padding-left: 18px; margin: 6px 0; }
    .msg-bubble li  { margin: 3px 0; }
    .msg-bubble code {
      background: rgba(26,86,219,0.08);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }
    .msg-bubble pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 12px;
      margin: 8px 0;
    }
    .msg-bubble strong { font-weight: 600; }

    /* ── Meta (timestamp, badges) ── */
    .msg-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msg-row.user .msg-meta { justify-content: flex-end; }
    .confidence-badge {
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
    }
    .conf-high   { background: #d1fae5; color: #065f46; }
    .conf-medium { background: #fef3c7; color: #92400e; }
    .conf-low    { background: #fee2e2; color: #991b1b; }
    .cached-pill {
      background: #e0e7ff;
      color: #3730a3;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 10px;
    }

    /* ── Sources ── */
    .sources-section { margin-top: 10px; }
    .sources-label { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
    .source-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #f1f5f9;
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      color: var(--text);
      margin: 2px 3px 2px 0;
    }
    .source-chip .page-num {
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      padding: 0 5px;
      font-size: 10px;
      font-weight: 700;
    }

    /* ── Follow-up Questions ── */
    .followup-section { margin-top: 12px; }
    .followup-label { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
    .followup-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: #f8faff;
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--primary);
      cursor: pointer;
      margin-bottom: 5px;
      transition: background .15s;
    }
    .followup-btn:hover { background: #eef2ff; }

    /* ── Feedback Row ── */
    .feedback-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 10px;
    }
    .feedback-label { font-size: 11px; color: var(--text-muted); }
    .star-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 2px;
      opacity: 0.4;
      transition: opacity .15s, transform .1s;
    }
    .star-btn:hover, .star-btn.active { opacity: 1; transform: scale(1.2); }
    .feedback-sent { font-size: 11px; color: var(--green); font-weight: 600; }

    /* ── Typing Indicator ── */
    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 10px 14px;
      background: var(--bot-bg);
      border-radius: 16px;
      border-top-left-radius: 4px;
      width: fit-content;
    }
    .typing-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--primary);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .4; }
      40%           { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Welcome Screen ── */
    .welcome-card {
      text-align: center;
      padding: 32px 20px;
    }
    .welcome-card .big-icon { font-size: 52px; margin-bottom: 12px; }
    .welcome-card h2 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .welcome-card p  { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .quick-starts { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .quick-btn {
      background: #f0f4ff;
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--primary);
      cursor: pointer;
      transition: background .15s;
    }
    .quick-btn:hover { background: #dbeafe; }

    /* ── Input Area ── */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      background: #fafbff;
    }
    .env-select-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .env-select-row label { font-size: 12px; color: var(--text-muted); }
    .env-select {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 12px;
      color: var(--text);
      background: #fff;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      outline: none;
      transition: border-color .2s;
      background: #fff;
    }
    #user-input:focus { border-color: var(--primary); }
    #send-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--primary);
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .1s;
      flex-shrink: 0;
    }
    #send-btn:hover   { background: var(--primary-dk); }
    #send-btn:active  { transform: scale(0.95); }
    #send-btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .char-count { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 4px; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      #chat-app { height: 100vh; border-radius: 0; }
      .msg-content { max-width: 90%; }
    }
  </style>
</head>
<body>
<div id="chat-app">

  <!-- Header -->
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <h1>BOTZI</h1>
      <p>Epicor AI Support Assistant</p>
    </div>
    <span class="env-badge" id="env-label">PROD</span>
    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
  </div>

  <!-- Messages -->
  <div id="messages">
    <!-- Welcome card injected by JS -->
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="env-select-row">
      <label>Environment:</label>
      <select class="env-select" id="env-select" onchange="updateEnv()">
        <option value="prod">Production</option>
        <option value="test">Test</option>
        <option value="dev">Development</option>
      </select>
    </div>
    <div class="input-row">
      <textarea id="user-input"
        placeholder="Ask an Epicor question… (Shift+Enter for new line)"
        rows="1"
        maxlength="2000"
        oninput="autoResize(this); updateCharCount()"
        onkeydown="handleKey(event)">
      </textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">➤</button>
    </div>
    <div class="char-count" id="char-count">0 / 2000</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// BOTZI Frontend – Chat Logic
// ═══════════════════════════════════════════════════════════

// ── Config ────────────────────────────────────────────────
// STEP: Replace with your actual Render backend URL
const API_BASE = window.location.hostname === "localhost"
  ? "http://localhost:8000"
  : "https://botzi-api.onrender.com";  // ← UPDATE THIS

let sessionId   = null;
let environment = "prod";
let isLoading   = false;
let pendingQuestion = null;  // used for star rating

// ── Quick-start prompts ────────────────────────────────────
const QUICK_STARTS = [
  "How do I resolve a BPM method directive error?",
  "What causes Epicor SSRS report subreport errors?",
  "How to set up a BAQ in Epicor Kinetic?",
  "What are common Epicor 10 installation issues?",
  "How to configure user security in Epicor?",
];

// ── Markdown-lite renderer ─────────────────────────────────
function renderMarkdown(text) {
  return text
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^/, '<p>').replace(/$/, '</p>');
}

// ── Show welcome screen ────────────────────────────────────
function showWelcome() {
  const container = document.getElementById("messages");
  const quickBtns = QUICK_STARTS
    .map(q => `<button class="quick-btn" onclick="askQuick('${q.replace(/'/g, "\\'")}')">${q}</button>`)
    .join("");
  container.innerHTML = `
    <div class="welcome-card">
      <div class="big-icon">🤖</div>
      <h2>Hi! I'm BOTZI</h2>
      <p>Your Epicor ERP AI Support Assistant.<br>
         Ask me anything about Epicor errors, configuration, BAQ, SSRS, BPM, and more.</p>
      <div class="quick-starts">${quickBtns}</div>
    </div>
  `;
}

function askQuick(q) {
  document.getElementById("user-input").value = q;
  sendMessage();
}

// ── New chat ───────────────────────────────────────────────
function newChat() {
  if (sessionId) {
    fetch(`${API_BASE}/api/chat/history/${sessionId}`, { method: "DELETE" }).catch(() => {});
  }
  sessionId = null;
  pendingQuestion = null;
  showWelcome();
}

// ── Environment selector ───────────────────────────────────
function updateEnv() {
  environment = document.getElementById("env-select").value;
  document.getElementById("env-label").textContent = environment.toUpperCase();
}

// ── Textarea helpers ───────────────────────────────────────
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 140) + "px";
}
function updateCharCount() {
  const len = document.getElementById("user-input").value.length;
  document.getElementById("char-count").textContent = `${len} / 2000`;
}
function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ── Append messages ────────────────────────────────────────
function appendUserMessage(text) {
  const container = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = "msg-row user";
  row.innerHTML = `
    <div class="msg-avatar">👤</div>
    <div class="msg-content">
      <div class="msg-bubble">${escapeHtml(text)}</div>
      <div class="msg-meta">${formatTime()}</div>
    </div>
  `;
  container.appendChild(row);
  scrollBottom();
}

function appendTyping() {
  const container = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = "msg-row bot";
  row.id = "typing-row";
  row.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-content">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;
  container.appendChild(row);
  scrollBottom();
}

function removeTyping() {
  document.getElementById("typing-row")?.remove();
}

function appendBotMessage(data) {
  const container = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = "msg-row bot";

  // Sources chips
  const sourcesHtml = (data.sources || []).map((s, i) => `
    <span class="source-chip">
      📄 ${escapeHtml(s.file_name)}
      <span class="page-num">P${s.page}</span>
    </span>
  `).join("");

  // Follow-up buttons
  const followHtml = (data.follow_up_questions || []).map(q => `
    <button class="followup-btn" onclick="askQuick('${escapeHtml(q).replace(/'/g, "\\'")}')">
      💬 ${escapeHtml(q)}
    </button>
  `).join("");

  const confClass = `conf-${data.confidence || "medium"}`;
  const cachedPill = data.cached ? `<span class="cached-pill">⚡ cached</span>` : "";
  const msgId = "msg-" + Date.now();

  row.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-content" id="${msgId}">
      <div class="msg-bubble">${renderMarkdown(data.answer || "")}</div>
      <div class="msg-meta">
        ${formatTime()}
        <span class="confidence-badge ${confClass}">${data.confidence || "medium"}</span>
        ${cachedPill}
        <span style="margin-left:auto">${data.response_time_ms}ms</span>
      </div>
      ${sourcesHtml ? `<div class="sources-section"><div class="sources-label">📚 Sources</div>${sourcesHtml}</div>` : ""}
      ${followHtml  ? `<div class="followup-section"><div class="followup-label">💡 You might also ask:</div>${followHtml}</div>` : ""}
      <div class="feedback-row" id="fb-${msgId}">
        <span class="feedback-label">Was this helpful?</span>
        ${[1,2,3,4,5].map(n => `<button class="star-btn" onclick="submitFeedback('${msgId}',${n})" title="${n} star">⭐</button>`).join("")}
      </div>
    </div>
  `;
  container.appendChild(row);
  scrollBottom();
}

// ── Feedback (star rating) ─────────────────────────────────
async function submitFeedback(msgId, rating) {
  const fbRow = document.getElementById(`fb-${msgId}`);
  if (!fbRow) return;

  // Highlight selected stars
  fbRow.querySelectorAll(".star-btn").forEach((btn, i) => {
    btn.classList.toggle("active", i < rating);
  });

  try {
    await fetch(`${API_BASE}/api/feedback`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        session_id: sessionId || "unknown",
        user_id:    "anonymous",
        question:   pendingQuestion || "",
        rating,
        helpful:    rating >= 4,
      }),
    });
    fbRow.innerHTML = `<span class="feedback-sent">✅ Thanks for your feedback!</span>`;
  } catch (e) {
    console.error("Feedback error:", e);
  }
}

// ── Main send ──────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById("user-input");
  const question = input.value.trim();
  if (!question || isLoading) return;

  // Clear welcome screen if first message
  const welcomeCard = document.querySelector(".welcome-card");
  if (welcomeCard) welcomeCard.parentElement.innerHTML = "";

  isLoading = true;
  pendingQuestion = question;
  document.getElementById("send-btn").disabled = true;
  input.value = "";
  input.style.height = "auto";
  updateCharCount();

  appendUserMessage(question);
  appendTyping();

  try {
    const resp = await fetch(`${API_BASE}/api/chat/message`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        question,
        session_id:  sessionId,
        environment,
        user_id:     "anonymous",
      }),
    });

    if (!resp.ok) throw new Error(`API error: ${resp.status}`);
    const data = await resp.json();

    // Save session ID for follow-up messages
    sessionId = data.session_id;

    removeTyping();
    appendBotMessage(data);

  } catch (err) {
    removeTyping();
    appendBotMessage({
      answer: `⚠️ Sorry, I couldn't reach the BOTZI service.\n\nError: ${err.message}\n\nPlease try again in a moment.`,
      follow_up_questions: [],
      sources: [],
      confidence: "low",
      cached: false,
      response_time_ms: 0,
    });
  } finally {
    isLoading = false;
    document.getElementById("send-btn").disabled = false;
    input.focus();
  }
}

// ── Helpers ────────────────────────────────────────────────
function scrollBottom() {
  const el = document.getElementById("messages");
  el.scrollTop = el.scrollHeight;
}
function formatTime() {
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ── Init ──────────────────────────────────────────────────
showWelcome();
</script>
</body>
</html>
